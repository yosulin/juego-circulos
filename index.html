<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Juego de Círculos</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #1a1f2e;
    --surface: #252b3b;
    --border: #343d54;
    --p1-color: #f4844a;
    --p2-color: #5b9cf6;
    --p1-light: rgba(244,132,74,0.25);
    --p2-light: rgba(91,156,246,0.25);
    --text: #e8eaf0;
    --muted: #7a82a0;
    --circle-r: 14;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Nunito', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 16px;
    gap: 16px;
  }

  h1 {
    font-family: 'Fredoka One', cursive;
    font-size: 1.8rem;
    letter-spacing: 1px;
    color: var(--text);
    text-align: center;
  }

  /* ── Panel superior ── */
  .top-panel {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    flex-wrap: nowrap;   /* SIEMPRE en una fila */
    width: 100%;
    max-width: 720px;
  }

  .player-card {
    background: var(--surface);
    border: 2px solid var(--border);
    border-radius: 14px;
    padding: 8px 10px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 2px;
    flex: 1;             /* ocupa espacio disponible equitativamente */
    min-width: 0;        /* permite shrink */
    transition: border-color .3s, box-shadow .3s;
  }
  .player-card.active { box-shadow: 0 0 0 3px currentColor; }
  .player-card.p1 { color: var(--p1-color); }
  .player-card.p1.active { border-color: var(--p1-color); }
  .player-card.p2 { color: var(--p2-color); }
  .player-card.p2.active { border-color: var(--p2-color); }

  .player-name {
    font-weight: 700; font-size: .72rem; text-transform: uppercase;
    letter-spacing: .5px; color: var(--muted);
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 100%;
  }
  .player-score { font-family: 'Fredoka One', cursive; font-size: 1.8rem; line-height: 1; }
  .player-initial { font-size: .8rem; font-weight: 600; }

  /* ── Dado ── */
  .dice-area {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
    flex-shrink: 0;      /* el dado no se encoge */
  }

  .dice {
    width: 52px; height: 52px;
    background: var(--surface);
    border: 2px solid var(--border);
    border-radius: 12px;
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    grid-template-rows: repeat(3, 1fr);
    padding: 6px;
    gap: 3px;
    cursor: pointer;
    transition: transform .15s, border-color .15s;
    position: relative;
  }
  .dice:hover { border-color: var(--muted); transform: scale(1.05); }
  .dice.rolling { animation: shake .4s ease; }

  @keyframes shake {
    0%,100% { transform: rotate(0deg) scale(1); }
    20% { transform: rotate(-12deg) scale(1.08); }
    40% { transform: rotate(10deg) scale(1.08); }
    60% { transform: rotate(-8deg) scale(1.05); }
    80% { transform: rotate(6deg) scale(1.05); }
  }

  .dot {
    border-radius: 50%;
    background: var(--text);
    width: 100%; height: 100%;
    visibility: hidden;
  }
  /* posiciones de los puntos en la cuadrícula 3x3 */
  .dot.on { visibility: visible; }

  .dice-label {
    font-size: .7rem;
    color: var(--muted);
    text-align: center;
    white-space: nowrap;
  }
  .lines-left {
    font-family: 'Fredoka One', cursive;
    font-size: .95rem;
    color: var(--text);
    white-space: nowrap;
  }

  /* ── Turno info ── */
  .turn-info {
    font-size: .9rem;
    color: var(--muted);
    text-align: center;
    min-height: 1.4em;
  }
  .turn-info span { font-weight: 700; }

  /* ── Canvas ── */
  .canvas-wrap {
    background: var(--surface);
    border: 2px solid var(--border);
    border-radius: 20px;
    overflow: hidden;
    width: 100%;
    max-width: 700px;
    aspect-ratio: 1;
    position: relative;
  }

  #gameCanvas {
    display: block;
    width: 100%;
    height: 100%;
    cursor: crosshair;
  }

  /* ── Botón nuevo juego ── */
  .btn-new {
    background: var(--surface);
    border: 2px solid var(--border);
    border-radius: 12px;
    color: var(--text);
    font-family: 'Nunito', sans-serif;
    font-size: .9rem;
    font-weight: 700;
    padding: 10px 24px;
    cursor: pointer;
    transition: border-color .2s, background .2s;
  }
  .btn-new:hover { border-color: var(--muted); background: var(--border); }

  /* ── Modal fin de juego ── */
  .modal-overlay {
    display: none;
    position: fixed; inset: 0;
    background: rgba(0,0,0,.65);
    z-index: 100;
    align-items: center;
    justify-content: center;
  }
  .modal-overlay.show { display: flex; }
  .modal {
    background: var(--surface);
    border: 2px solid var(--border);
    border-radius: 24px;
    padding: 36px 48px;
    text-align: center;
    display: flex;
    flex-direction: column;
    gap: 16px;
  }
  .modal h2 { font-family: 'Fredoka One', cursive; font-size: 2rem; }
  .modal p { color: var(--muted); }

  #installBanner {
    display: none; position: fixed; bottom: 20px; left: 50%;
    transform: translateX(-50%); background: #252b3b;
    border: 2px solid #5b9cf6; border-radius: 16px;
    padding: 14px 20px; z-index: 200; align-items: center;
    gap: 14px; box-shadow: 0 8px 32px rgba(0,0,0,.5);
    max-width: 320px; width: 90%;
  }
  #installBanner.show { display: flex; }
  #installBanner .ib-icon { font-size: 1.8rem; flex-shrink:0; }
  #installBanner .ib-text { flex:1; }
  #installBanner .ib-text strong { display:block; font-family:'Fredoka One',cursive; font-size:1rem; color:#e8eaf0; }
  #installBanner .ib-text span { font-size:.75rem; color:#7a82a0; }
  #installBanner .ib-btn { background: #5b9cf6; color: #1a1f2e; border: none; border-radius: 10px; padding: 8px 14px; font-family:'Nunito',sans-serif; font-weight:700; font-size:.85rem; cursor:pointer; white-space:nowrap; flex-shrink:0; }
  #installBanner .ib-close { background:none; border:none; color:#7a82a0; font-size:1.1rem; cursor:pointer; padding:0; flex-shrink:0; }

  /* ── Setup Panel ── */
  .setup-box {
    background: var(--surface);
    border: 2px solid var(--border);
    border-radius: 20px;
    padding: 24px 20px;
    width: 100%;
    max-width: 480px;
    display: flex;
    flex-direction: column;
    gap: 20px;
  }
  .setup-section { display: flex; flex-direction: column; gap: 10px; }
  .setup-label {
    font-size: .75rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--muted);
  }
  /* Selector número de jugadores */
  .player-count-row {
    display: flex;
    gap: 8px;
  }
  .pc-btn {
    flex: 1;
    background: var(--bg);
    border: 2px solid var(--border);
    border-radius: 10px;
    color: var(--muted);
    font-family: 'Fredoka One', cursive;
    font-size: 1.1rem;
    padding: 10px 4px;
    cursor: pointer;
    transition: all .2s;
    text-align: center;
  }
  .pc-btn.active {
    background: var(--surface);
    border-color: var(--p1-color);
    color: var(--p1-color);
  }
  /* Inputs de nombres */
  .names-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
  }
  .name-input-wrap { position: relative; }
  .name-dot {
    position: absolute;
    left: 10px;
    top: 50%;
    transform: translateY(-50%);
    width: 8px; height: 8px;
    border-radius: 50%;
  }
  .setup-input {
    width: 100%;
    background: var(--bg);
    border: 2px solid var(--border);
    border-radius: 10px;
    color: var(--text);
    font-family: 'Nunito', sans-serif;
    font-size: .85rem;
    padding: 9px 10px 9px 26px;
    outline: none;
    box-sizing: border-box;
    transition: border-color .2s;
  }
  .setup-input:focus { border-color: var(--muted); }
  /* Slider círculos */
  .slider-row {
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .slider-row input[type=range] {
    flex: 1;
    accent-color: var(--p2-color);
    height: 4px;
  }
  .slider-val {
    font-family: 'Fredoka One', cursive;
    font-size: 1.3rem;
    color: var(--text);
    min-width: 36px;
    text-align: right;
  }
  .rec-hint {
    font-size: .72rem;
    color: var(--p2-color);
    min-height: 1em;
  }

  /* ── Toggle orden aleatorio ── */
  .toggle-row {
    display: flex;
    align-items: center;
    gap: 14px;
    cursor: pointer;
    user-select: none;
  }
  .toggle-track {
    width: 46px; height: 26px;
    background: var(--border);
    border-radius: 13px;
    position: relative;
    flex-shrink: 0;
    transition: background .25s;
  }
  .toggle-track.on { background: var(--p2-color); }
  .toggle-thumb {
    width: 20px; height: 20px;
    background: #fff;
    border-radius: 50%;
    position: absolute;
    top: 3px; left: 3px;
    transition: left .25s;
    box-shadow: 0 1px 4px rgba(0,0,0,.3);
  }
  .toggle-track.on .toggle-thumb { left: 23px; }
  .toggle-label-text { display: flex; flex-direction: column; gap: 1px; }
  .toggle-label-text span { font-size: .88rem; font-weight: 600; color: var(--text); }
  .toggle-sub { font-size: .72rem !important; font-weight: 400 !important; color: var(--muted) !important; }

</style>

  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#1a1f2e">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Círculos">
  <link rel="apple-touch-icon" href="icon-192.png">
</head>
<body>

<h1>⬤ Juego de Círculos</h1>
<div style="font-size:.72rem;color:var(--muted);letter-spacing:1px;margin-top:-8px;">v2.4</div>

<!-- Config de nombres -->
<div id="setupPanel" style="display:flex;flex-direction:column;align-items:center;gap:16px;width:100%;max-width:480px;">
  <div class="setup-box">

    <!-- Número de jugadores -->
    <div class="setup-section">
      <div class="setup-label">Número de jugadores</div>
      <div class="player-count-row" id="pcRow">
        <div class="pc-btn active" onclick="setPlayerCount(2)">2</div>
        <div class="pc-btn" onclick="setPlayerCount(3)">3</div>
        <div class="pc-btn" onclick="setPlayerCount(4)">4</div>
        <div class="pc-btn" onclick="setPlayerCount(5)">5</div>
        <div class="pc-btn" onclick="setPlayerCount(6)">6</div>
      </div>
    </div>

    <!-- Nombres -->
    <div class="setup-section">
      <div class="setup-label">Nombres</div>
      <div class="names-grid" id="namesGrid"></div>
    </div>

    <!-- Tamaño del tablero -->
    <div class="setup-section">
      <div class="setup-label">Círculos en el tablero</div>
      <div class="slider-row">
        <input type="range" id="circleSlider" min="25" max="100" value="35"
          oninput="onSliderChange(this.value)">
        <div class="slider-val" id="sliderVal">35</div>
      </div>
      <div class="rec-hint" id="recHint"></div>
    </div>

    <!-- Orden aleatorio -->
    <div class="setup-section">
      <label class="toggle-row" onclick="toggleRandom()">
        <div class="toggle-track" id="toggleTrack">
          <div class="toggle-thumb" id="toggleThumb"></div>
        </div>
        <div class="toggle-label-text">
          <span>Orden de inicio aleatorio</span>
          <span class="toggle-sub">Se sortea quién empieza</span>
        </div>
      </label>
    </div>

  </div>
  <button class="btn-new" onclick="startGame()" style="width:100%;max-width:480px;padding:14px;font-size:1rem;">▶ Empezar</button>
</div>

<div id="gameUI" style="display:none;width:100%;max-width:720px;display:none;flex-direction:column;align-items:center;gap:16px;">

  <!-- Tarjetas de jugadores: generadas dinámicamente por buildGameUI() -->
  <div class="top-panel" id="topPanel" style="flex-wrap:wrap;">
    <div class="dice-area">
      <div class="dice" id="dice" onclick="rollDice()">
        <div class="dot" id="d1"></div>
        <div class="dot" id="d2"></div>
        <div class="dot" id="d3"></div>
        <div class="dot" id="d4"></div>
        <div class="dot" id="d5"></div>
        <div class="dot" id="d6"></div>
        <div class="dot" id="d7"></div>
        <div class="dot" id="d8"></div>
        <div class="dot" id="d9"></div>
      </div>
      <div class="dice-label">
        <div id="linesLeftLabel" class="lines-left">Tira el dado</div>
      </div>
    </div>
  </div>

  <div class="turn-info" id="turnInfo">–</div>

  <div class="canvas-wrap">
    <canvas id="gameCanvas"></canvas>
  </div>

  <button class="btn-new" onclick="confirmNewGame()">↺ Nuevo juego</button>
</div>

<!-- Modal -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <h2 id="modalTitle">¡Fin del juego!</h2>
    <p id="modalBody"></p>
    <button class="btn-new" onclick="startGame()">▶ Jugar de nuevo</button>
  </div>
</div>

<script>
// ── Constantes ──────────────────────────────────────────────────────────────
let CIRCLE_R  = 14;    // radio visual (se recalcula según N_CIRCLES)
let HIT_R     = 22;    // radio de click (siempre táctil)
let MIN_DIST  = 70;    // distancia mínima entre centros (se recalcula)
let MAX_DIST  = 160;   // distancia máxima para ser adyacentes (se recalcula)
let N_CIRCLES = 35;    // número de círculos (configurable)

// Disposiciones de puntos en el dado (cuadrícula 3x3, índices 0-8)
const DICE_DOTS = {
  1: [4],
  2: [0,8],
  3: [0,4,8],
  4: [0,2,6,8],
  5: [0,2,4,6,8],
  6: [0,2,3,5,6,8]
};

// ── Estado ──────────────────────────────────────────────────────────────────
let circles = [];      // {x,y}
let edges   = new Set(); // "i-j" (i<j)
let triangles= [];     // {a,b,c,owner}
let players = [{name:'J1',initial:'J',score:0},{name:'J2',initial:'J',score:0}];
let currentPlayer = 0;
let linesLeft = 0;     // líneas que puede trazar este turno (tras tirar dado)
let diceRolled = false;
let selectedCircle = null;

let canvas, ctx, W, H;

// ── Inicio ──────────────────────────────────────────────────────────────────
function startGame() {
  // Leer nombres dinámicos
  players = [];
  for (let i = 0; i < numPlayers; i++) {
    const el = document.getElementById(`nameInput${i}`);
    const raw = el ? el.value.trim() : '';
    const name = raw || `Jugador ${i+1}`;
    players.push({name, initial: name[0].toUpperCase(), score: 0});
  }
  // Leer número de círculos del slider
  N_CIRCLES = parseInt(document.getElementById('circleSlider').value) || 35;

  document.getElementById('setupPanel').style.display = 'none';
  const ui = document.getElementById('gameUI');
  ui.style.display = 'flex';

  // Orden aleatorio: mezclar array de jugadores si está activado
  if (randomOrder) {
    for (let i = players.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [players[i], players[j]] = [players[j], players[i]];
    }
  }

  document.getElementById('modalOverlay').classList.remove('show');
  buildGameUI();

  canvas = document.getElementById('gameCanvas');
  const wrap = canvas.parentElement;
  const sz   = wrap.clientWidth;
  canvas.width  = sz;
  canvas.height = sz;
  W = H = sz;
  ctx = canvas.getContext('2d');

  edges      = new Set();
  triangles  = [];
  currentPlayer = 0;
  linesLeft  = 0;
  diceRolled = false;
  selectedCircle = null;

  generateCircles();
  updateDiceDisplay(0);
  updateActiveCards();
  updateTurnInfo();
  draw();

  canvas.onclick = handleCanvasClick;
}

function confirmNewGame() {
  if (confirm('¿Empezar nuevo juego?')) startGame();
}

// ── Generación de círculos ───────────────────────────────────────────────────
function generateCircles() {
  // Ajustar tamaño y distancias según N_CIRCLES
  // Radio visual: interpola entre 16px (25 círculos) y 7px (100 círculos)
  CIRCLE_R = Math.round(16 - (N_CIRCLES - 25) * (9 / 75));
  CIRCLE_R = Math.max(7, Math.min(16, CIRCLE_R));
  // Hit area táctil: siempre al menos 20px, escala un poco con el círculo
  HIT_R = Math.max(20, CIRCLE_R + 8);

  // Distancias: basadas en área disponible por círculo
  const area = W * H;
  const areaPerCircle = area / N_CIRCLES;
  const avgDist = Math.sqrt(areaPerCircle);
  MIN_DIST = Math.max(CIRCLE_R * 2 + 6, avgDist * 0.55);
  MAX_DIST = avgDist * 1.45;

  circles = [];
  const padding = CIRCLE_R + 20;
  let attempts = 0;
  while (circles.length < N_CIRCLES && attempts < 5000) {
    attempts++;
    const x = padding + Math.random() * (W - padding * 2);
    const y = padding + Math.random() * (H - padding * 2);
    let valid = true;
    for (const c of circles) {
      if (dist(x, y, c.x, c.y) < MIN_DIST) { valid = false; break; }
    }
    if (valid) circles.push({x, y});
  }
}

// ── Dado ─────────────────────────────────────────────────────────────────────
function rollDice() {
  if (diceRolled && linesLeft > 0) return; // ya tiró y le quedan líneas
  const dice = document.getElementById('dice');
  dice.classList.add('rolling');
  setTimeout(() => {
    dice.classList.remove('rolling');
    const val = Math.floor(Math.random() * 6) + 1;
    linesLeft  = val;
    diceRolled = true;
    updateDiceDisplay(val);
    // Comprobar si hay movimientos disponibles tras tirar
    const active = circlesWithMoves();
    if (active.size === 0) {
      if (noMoreMoves()) { endGame(); return; }
      showBlockedMessage(val);
      linesLeft = 0;
      diceRolled = false;
      updateDiceDisplay(0);
      setTimeout(() => advanceTurn(), 1800);
    } else {
      updateTurnInfo();
    }
    draw();
  }, 420);
}

function updateDiceDisplay(val) {
  const dots = document.querySelectorAll('.dot');
  dots.forEach(d => d.classList.remove('on'));
  if (val > 0) {
    DICE_DOTS[val].forEach(i => dots[i].classList.add('on'));
  }
  const ll = document.getElementById('linesLeftLabel');
  if (val === 0) {
    ll.textContent = 'Tira el dado';
  } else if (linesLeft > 0) {
    ll.textContent = `${linesLeft} línea${linesLeft !== 1 ? 's' : ''}`;
  } else {
    ll.textContent = 'Sin líneas';
  }
}

// ── Canvas click ──────────────────────────────────────────────────────────────
function handleCanvasClick(e) {
  if (!diceRolled || linesLeft <= 0) return;

  const rect = canvas.getBoundingClientRect();
  const scaleX = W / rect.width;
  const scaleY = H / rect.height;
  const mx = (e.clientX - rect.left) * scaleX;
  const my = (e.clientY - rect.top)  * scaleY;

  // ¿Hizo click sobre un círculo?
  const hit = circles.findIndex(c => dist(mx, my, c.x, c.y) < HIT_R);
  if (hit === -1) { selectedCircle = null; draw(); return; }

  if (selectedCircle === null) {
    selectedCircle = hit;
    draw();
    return;
  }

  if (selectedCircle === hit) {
    selectedCircle = null;
    draw();
    return;
  }

  // Intentar trazar línea
  const a = Math.min(selectedCircle, hit);
  const b = Math.max(selectedCircle, hit);
  const key = `${a}-${b}`;

  if (edges.has(key)) {
    // ya existe, simplemente seleccionar el nuevo
    selectedCircle = hit;
    draw();
    return;
  }

  if (dist(circles[a].x, circles[a].y, circles[b].x, circles[b].y) > MAX_DIST) {
    // no adyacentes
    selectedCircle = hit;
    draw();
    return;
  }

  // No cruzar aristas existentes ni atravesar triángulos ya cerrados
  if (lineIntersectsAny(a, b)) {
    selectedCircle = hit;
    draw();
    return;
  }

  // Trazar
  edges.add(key);
  linesLeft--;

  // Buscar triángulos nuevos
  const newTris = findNewTriangles(a, b);
  newTris.forEach(tri => {
    triangles.push({...tri, owner: currentPlayer});
    players[currentPlayer].score++;
  });
  updateScores();

  selectedCircle = null;
  draw();

  if (linesLeft === 0) {
    diceRolled = false;
    updateDiceDisplay(0);
    if (noMoreMoves()) { endGame(); return; }
    advanceTurn();
  } else {
    // Quedan líneas — ¿hay movimientos válidos?
    if (noMoreMoves()) { endGame(); return; }
    const active = circlesWithMoves();
    if (active.size === 0) {
      // Bloqueado con líneas sobrantes — pasar turno
      showBlockedMessage(linesLeft);
      linesLeft = 0;
      diceRolled = false;
      updateDiceDisplay(0);
      setTimeout(() => {
        advanceTurn();
      }, 1800);
      return;
    }
    updateDiceDisplay(null);
    document.getElementById('linesLeftLabel').textContent = `${linesLeft} línea${linesLeft !== 1 ? 's' : ''}`;
    updateTurnInfo();
  }
  draw();
}

// ── Detección de triángulos ───────────────────────────────────────────────────
function edgeExists(i, j) {
  return edges.has(`${Math.min(i,j)}-${Math.max(i,j)}`);
}

function connectionCount(idx) {
  let count = 0;
  edges.forEach(key => {
    const [i, j] = key.split('-').map(Number);
    if (i === idx || j === idx) count++;
  });
  return count;
}

function areAdjacent(i, j) {
  return dist(circles[i].x, circles[i].y, circles[j].x, circles[j].y) <= MAX_DIST;
}

// ── Geometría: intersección de segmentos ─────────────────────────────────────
// Producto vectorial 2D
function cross2d(ax, ay, bx, by) {
  return ax * by - ay * bx;
}

// ¿El punto (px,py) está en el segmento (ax,ay)-(bx,by)? (asumiendo colineal)
function onSegment(ax, ay, bx, by, px, py) {
  return Math.min(ax,bx) - 1e-9 <= px && px <= Math.max(ax,bx) + 1e-9 &&
         Math.min(ay,by) - 1e-9 <= py && py <= Math.max(ay,by) + 1e-9;
}

// ¿Se cruzan los segmentos p1-p2 y p3-p4? (ignorando extremos compartidos)
function segmentsIntersect(x1,y1,x2,y2, x3,y3,x4,y4) {
  const dx1 = x2-x1, dy1 = y2-y1;
  const dx2 = x4-x3, dy2 = y4-y3;
  const denom = cross2d(dx1, dy1, dx2, dy2);
  const eps = 1e-9;

  if (Math.abs(denom) < eps) {
    // Paralelas / colineales: no las consideramos cruce válido
    return false;
  }

  const t = cross2d(x3-x1, y3-y1, dx2, dy2) / denom;
  const u = cross2d(x3-x1, y3-y1, dx1, dy1) / denom;

  // Cruce real solo si t y u están estrictamente en (0,1) — excluimos extremos compartidos
  const margin = 1e-6;
  return t > margin && t < 1-margin && u > margin && u < 1-margin;
}

// Distancia de punto (px,py) al segmento (ax,ay)-(bx,by)
function pointToSegmentDist(px, py, ax, ay, bx, by) {
  const dx = bx - ax, dy = by - ay;
  const lenSq = dx*dx + dy*dy;
  if (lenSq === 0) return Math.hypot(px-ax, py-ay);
  let t = ((px-ax)*dx + (py-ay)*dy) / lenSq;
  t = Math.max(0, Math.min(1, t));
  return Math.hypot(px - (ax + t*dx), py - (ay + t*dy));
}

// ¿El segmento a-b cruza alguna arista existente o atraviesa algún triángulo cerrado?
function lineIntersectsAny(idxA, idxB) {
  const ax = circles[idxA].x, ay = circles[idxA].y;
  const bx = circles[idxB].x, by = circles[idxB].y;

  // 0. La línea no puede pasar POR ENCIMA de otro círculo (no extremo).
  //    Usamos el radio visual como umbral — si el centro del círculo
  //    queda más cerca que CIRCLE_R del segmento Y el punto de proyección
  //    está estrictamente entre los dos extremos, lo bloqueamos.
  for (let k = 0; k < circles.length; k++) {
    if (k === idxA || k === idxB) continue;
    const ck = circles[k];
    const dx = bx - ax, dy = by - ay;
    const lenSq = dx*dx + dy*dy;
    if (lenSq === 0) continue;
    const t = Math.max(0, Math.min(1, ((ck.x-ax)*dx + (ck.y-ay)*dy) / lenSq));
    // Solo bloqueamos si la proyección cae ENTRE los extremos (t en 0.05..0.95)
    if (t > 0.05 && t < 0.95) {
      const distSq = Math.pow(ck.x - (ax + t*dx), 2) + Math.pow(ck.y - (ay + t*dy), 2);
      if (distSq < (CIRCLE_R * CIRCLE_R)) return true;
    }
  }

  // 1. La línea no puede cruzar aristas existentes que no compartan extremo.
  for (const key of edges) {
    const [i, j] = key.split('-').map(Number);
    if (i === idxA || i === idxB || j === idxA || j === idxB) continue;
    const cx = circles[i].x, cy = circles[i].y;
    const dx = circles[j].x, dy = circles[j].y;
    if (segmentsIntersect(ax,ay,bx,by, cx,cy,dx,dy)) return true;
  }

  // 2. La línea no puede atravesar el INTERIOR de un triángulo cerrado.
  for (const t of triangles) {
    const va = t.a, vb = t.b, vc = t.c;
    const tax = circles[va].x, tay = circles[va].y;
    const tbx = circles[vb].x, tby = circles[vb].y;
    const tcx = circles[vc].x, tcy = circles[vc].y;

    // Si idxA o idxB son vértice de este triángulo, la línea sale desde dentro:
    // solo bloqueamos si cruza un lado que NO comparte ese vértice.
    const aInTri = (idxA === va || idxA === vb || idxA === vc);
    const bInTri = (idxB === va || idxB === vb || idxB === vc);

    const sides = [
      [va, vb, tax, tay, tbx, tby],
      [vb, vc, tbx, tby, tcx, tcy],
      [va, vc, tax, tay, tcx, tcy]
    ];

    for (const [si, sj, sx1, sy1, sx2, sy2] of sides) {
      // Ignorar lados que comparten vértice con los extremos de la nueva arista
      if (si === idxA || si === idxB || sj === idxA || sj === idxB) continue;
      if (segmentsIntersect(ax, ay, bx, by, sx1, sy1, sx2, sy2)) return true;
    }

    // El punto medio no puede estar dentro del triángulo,
    // SALVO que alguno de los extremos sea vértice de este triángulo
    // (en ese caso la línea sale legítimamente hacia fuera)
    if (!aInTri && !bInTri) {
      const mid_x = (ax + bx) / 2, mid_y = (ay + by) / 2;
      if (pointInTriangle(mid_x, mid_y, tax, tay, tbx, tby, tcx, tcy)) return true;
    }
  }

  return false;
}

// ¿El punto (px,py) está dentro del triángulo (ax,ay)-(bx,by)-(cx,cy)?
function pointInTriangle(px, py, ax, ay, bx, by, cx, cy) {
  const d1 = cross2d(px-ax, py-ay, bx-ax, by-ay);
  const d2 = cross2d(px-bx, py-by, cx-bx, cy-by);
  const d3 = cross2d(px-cx, py-cy, ax-cx, ay-cy);
  const hasNeg = (d1 < -1e-9) || (d2 < -1e-9) || (d3 < -1e-9);
  const hasPos = (d1 >  1e-9) || (d2 >  1e-9) || (d3 >  1e-9);
  return !(hasNeg && hasPos);
}

function findNewTriangles(a, b) {
  const found = [];
  for (let c = 0; c < circles.length; c++) {
    if (c === a || c === b) continue;
    // Las TRES aristas deben existir como edges y además ser adyacentes
    if (!edgeExists(a, c) || !edgeExists(b, c)) continue;
    if (!areAdjacent(a, c) || !areAdjacent(b, c)) continue;
    // No duplicar triángulos ya registrados
    const key3 = [a, b, c].sort((x,y)=>x-y).join('-');
    const already = triangles.some(t => [t.a,t.b,t.c].sort((x,y)=>x-y).join('-') === key3);
    if (already) continue;
    found.push({a, b, c});
  }
  return found;
}

// ── ¿Quedan movimientos? ──────────────────────────────────────────────────────
function noMoreMoves() {
  for (let i = 0; i < circles.length; i++) {
    for (let j = i+1; j < circles.length; j++) {
      if (!edges.has(`${i}-${j}`) &&
          dist(circles[i].x,circles[i].y,circles[j].x,circles[j].y) <= MAX_DIST &&
          !lineIntersectsAny(i, j)) {
        return false;
      }
    }
  }
  return true;
}

// Devuelve Set de índices de círculos que tienen al menos una conexión válida posible
function circlesWithMoves() {
  const active = new Set();
  for (let i = 0; i < circles.length; i++) {
    for (let j = i+1; j < circles.length; j++) {
      if (!edges.has(`${i}-${j}`) &&
          dist(circles[i].x,circles[i].y,circles[j].x,circles[j].y) <= MAX_DIST &&
          !lineIntersectsAny(i, j)) {
        active.add(i);
        active.add(j);
      }
    }
  }
  return active;
}

// ── UI ────────────────────────────────────────────────────────────────────────
function updateScores() {
  players.forEach((p, i) => {
    const el = document.getElementById(`score${i+1}`);
    if (el) el.textContent = p.score;
  });
}

function updateActiveCards() {
  players.forEach((_, i) => {
    const el = document.getElementById(`card${i+1}`);
    if (el) el.classList.toggle('active', currentPlayer === i);
  });
}

function updateTurnInfo() {
  const p = players[currentPlayer];
  const color = PLAYER_COLORS[currentPlayer] || 'var(--p1-color)';
  const el = document.getElementById('turnInfo');
  if (!diceRolled) {
    el.innerHTML = `Turno de <span style="color:${color}">${p.name}</span> — tira el dado`;
  } else {
    el.innerHTML = `<span style="color:${color}">${p.name}</span> — traza ${linesLeft} línea${linesLeft!==1?'s':''} más`;
  }
}

function advanceTurn() {
  currentPlayer = (currentPlayer + 1) % players.length;
  updateActiveCards();
  updateTurnInfo();
  draw();
}

function showBlockedMessage(remaining) {
  const p = players[currentPlayer];
  const color = PLAYER_COLORS[currentPlayer] || '#fff';
  const el = document.getElementById('turnInfo');
  el.innerHTML = `<span style="color:${color}">${p.name}</span> — sin movimientos posibles, pierde ${remaining} línea${remaining !== 1 ? 's' : ''}`;
  selectedCircle = null;
}

function endGame() {
  document.getElementById('modalTitle').textContent = '¡Fin del juego!';
  // Tabla de resultados
  const sorted = [...players].map((p,i) => ({...p, idx:i})).sort((a,b) => b.score - a.score);
  let body = sorted.map(p => {
    const color = PLAYER_COLORS[p.idx];
    return `<span style="color:${color};font-weight:700">${p.name}</span>: ${p.score} triángulo${p.score!==1?'s':''}`;
  }).join('&nbsp; · &nbsp;');
  body += '<br><br>';
  const maxScore = sorted[0].score;
  const winners = sorted.filter(p => p.score === maxScore);
  if (winners.length > 1) {
    body += `🤝 ¡Empate entre ${winners.map(p=>`<strong>${p.name}</strong>`).join(' y ')}!`;
  } else {
    body += `🏆 ¡Gana <strong style="color:${PLAYER_COLORS[winners[0].idx]}">${winners[0].name}</strong>!`;
  }
  document.getElementById('modalBody').innerHTML = body;
  document.getElementById('modalOverlay').classList.add('show');
}

// ── Dibujo ────────────────────────────────────────────────────────────────────
function draw() {
  ctx.clearRect(0, 0, W, H);

  // Triángulos rellenos
  triangles.forEach(t => {
    const ca = circles[t.a], cb = circles[t.b], cc = circles[t.c];
    ctx.beginPath();
    ctx.moveTo(ca.x, ca.y);
    ctx.lineTo(cb.x, cb.y);
    ctx.lineTo(cc.x, cc.y);
    ctx.closePath();
    ctx.fillStyle = PLAYER_COLORS_LIGHT[t.owner] || 'rgba(255,255,255,0.1)';
    ctx.fill();

    // Inicial del jugador centrada
    const cx = (ca.x + cb.x + cc.x) / 3;
    const cy = (ca.y + cb.y + cc.y) / 3;
    ctx.font = 'bold 14px Nunito, sans-serif';
    ctx.fillStyle = PLAYER_COLORS[t.owner] || '#ffffff';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(players[t.owner].initial, cx, cy);
  });

  // Líneas existentes
  edges.forEach(key => {
    const [i, j] = key.split('-').map(Number);
    drawLine(circles[i], circles[j], 'rgba(255,255,255,0.18)', 2);
  });

  // Línea provisional: desde seleccionado hasta cursor (no implementada — se dibuja abajo)

  // Líneas adyacentes posibles del seleccionado (hint visual)
  if (selectedCircle !== null && linesLeft > 0) {
    const sc = circles[selectedCircle];
    circles.forEach((c, i) => {
      if (i === selectedCircle) return;
      if (dist(sc.x, sc.y, c.x, c.y) <= MAX_DIST &&
          !edges.has(`${Math.min(selectedCircle,i)}-${Math.max(selectedCircle,i)}`) &&
          !lineIntersectsAny(selectedCircle, i)) {
        drawLine(sc, c, 'rgba(255,255,255,0.07)', 1.5);
      }
    });
  }

  // Calcular círculos con movimientos válidos (para apagar los bloqueados)
  const activeCircles = diceRolled ? circlesWithMoves() : null;

  // Círculos
  circles.forEach((c, i) => {
    const isSelected = i === selectedCircle;
    const isAdj = selectedCircle !== null && i !== selectedCircle &&
                  dist(circles[selectedCircle].x, circles[selectedCircle].y, c.x, c.y) <= MAX_DIST &&
                  !edges.has(`${Math.min(selectedCircle,i)}-${Math.max(selectedCircle,i)}`) &&
                  !lineIntersectsAny(selectedCircle, i);
    const isBlocked = activeCircles !== null && !activeCircles.has(i);

    ctx.beginPath();
    ctx.arc(c.x, c.y, CIRCLE_R, 0, Math.PI * 2);

    if (isSelected) {
      const pc = PLAYER_COLORS[currentPlayer] || '#ffffff';
      ctx.fillStyle = pc + '80';
      ctx.strokeStyle = pc;
      ctx.lineWidth = 3;
    } else if (isAdj && linesLeft > 0) {
      ctx.fillStyle = 'rgba(255,255,255,0.12)';
      ctx.strokeStyle = 'rgba(255,255,255,0.4)';
      ctx.lineWidth = 2;
    } else if (isBlocked) {
      // Sin movimientos posibles: muy apagado
      ctx.fillStyle = '#1e2235';
      ctx.strokeStyle = '#2a3048';
      ctx.lineWidth = 1.5;
      ctx.globalAlpha = 0.45;
    } else {
      ctx.fillStyle = '#2e364a';
      ctx.strokeStyle = '#4a5370';
      ctx.lineWidth = 2;
    }
    ctx.fill();
    ctx.stroke();
    ctx.globalAlpha = 1; // restaurar siempre
  });
}

function drawLine(a, b, color, width) {
  ctx.beginPath();
  ctx.moveTo(a.x, a.y);
  ctx.lineTo(b.x, b.y);
  ctx.strokeStyle = color;
  ctx.lineWidth = width;
  ctx.stroke();
}

// ── Utilidades ────────────────────────────────────────────────────────────────
function dist(x1,y1,x2,y2) {
  return Math.sqrt((x2-x1)**2 + (y2-y1)**2);
}


// ── Colores para hasta 6 jugadores ──────────────────────────────────────────
const PLAYER_COLORS = ["#f4844a", "#5b9cf6", "#6bcb77", "#f7c59f", "#d98cf0", "#ffd166"];
const PLAYER_COLORS_LIGHT = ["rgba(244,132,74,0.22)", "rgba(91,156,246,0.22)", "rgba(107,203,119,0.22)", "rgba(247,197,159,0.22)", "rgba(217,140,240,0.22)", "rgba(255,209,102,0.22)"];

// Recomendaciones de círculos según número de jugadores
const CIRCLE_REC = {1:25, 2:35, 3:50, 4:65, 5:80, 6:100};

let numPlayers = 2;
let randomOrder = false;

function toggleRandom() {
  randomOrder = !randomOrder;
  const track = document.getElementById('toggleTrack');
  track.classList.toggle('on', randomOrder);
}

function setPlayerCount(n) {
  numPlayers = n;
  document.querySelectorAll('.pc-btn').forEach((btn, i) => {
    btn.classList.toggle('active', i+2 === n);  // empieza desde 2
  });
  buildNamesGrid();
  // Sugerir círculos
  const rec = CIRCLE_REC[n];
  document.getElementById('circleSlider').value = rec;
  document.getElementById('sliderVal').textContent = rec;
  updateRecHint(n, rec);
}

function buildNamesGrid() {
  const grid = document.getElementById('namesGrid');
  grid.innerHTML = '';
  for (let i = 0; i < numPlayers; i++) {
    const color = PLAYER_COLORS[i];
    const wrap = document.createElement('div');
    wrap.className = 'name-input-wrap';
    wrap.innerHTML = `
      <div class="name-dot" style="background:${color}"></div>
      <input class="setup-input" id="nameInput${i}"
        placeholder="Jugador ${i+1}" maxlength="14">`;
    grid.appendChild(wrap);
  }
}

function onSliderChange(val) {
  document.getElementById('sliderVal').textContent = val;
  updateRecHint(numPlayers, parseInt(val));
}

function updateRecHint(n, val) {
  const rec = CIRCLE_REC[n];
  const hint = document.getElementById('recHint');
  if (val === rec) {
    hint.textContent = `✓ Tamaño recomendado para ${n} jugador${n>1?'es':''}`;
  } else if (val < rec) {
    hint.textContent = `Recomendado para ${n} jugador${n>1?'es':''}: ${rec} círculos`;
  } else {
    hint.textContent = `Recomendado para ${n} jugador${n>1?'es':''}: ${rec} círculos`;
  }
}

function buildGameUI() {
  const panel = document.getElementById('topPanel');
  // Limpiar tarjetas anteriores (conservar el dado)
  const diceArea = panel.querySelector('.dice-area');
  panel.innerHTML = '';

  // Insertar tarjetas: mitad antes del dado, mitad después (o todas antes si 1-3)
  const half = Math.ceil(players.length / 2);
  players.forEach((p, i) => {
    const color = PLAYER_COLORS[i];
    const pClass = i === 0 ? 'p1' : i === 1 ? 'p2' : '';
    const card = document.createElement('div');
    card.className = `player-card`;
    card.id = `card${i+1}`;
    card.style.cssText = `color:${color};border-color:var(--border);`;
    card.innerHTML = `
      <span class="player-name" id="label${i+1}">${p.name.toUpperCase()}</span>
      <span class="player-score" id="score${i+1}">0</span>
      <span class="player-initial" id="init${i+1}">${p.initial}</span>`;
    if (i === half) panel.appendChild(diceArea);
    panel.appendChild(card);
  });
  if (!panel.contains(diceArea)) panel.appendChild(diceArea);
}

// Inicializar setup al cargar
window.addEventListener('DOMContentLoaded', () => {
  setPlayerCount(2); // mínimo y default: 2 jugadores
});

// Responsive: redibujar si cambia el tamaño
window.addEventListener('resize', () => {
  if (!canvas) return;
  const wrap = canvas.parentElement;
  const sz   = wrap.clientWidth;
  // Reescalar posiciones
  const scale = sz / W;
  circles.forEach(c => { c.x *= scale; c.y *= scale; });
  canvas.width = canvas.height = W = H = sz;
  draw();
});
</script>

<div id="installBanner">
  <div class="ib-icon">⬤</div>
  <div class="ib-text"><strong>Instalar app</strong><span>Juega sin conexión</span></div>
  <button class="ib-btn" id="installBtn">Instalar</button>
  <button class="ib-close" id="installClose">✕</button>
</div>

<script>
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => { navigator.serviceWorker.register('sw.js').catch(()=>{}); });
}
let deferredPrompt = null;
const banner = document.getElementById('installBanner');
const installBtn = document.getElementById('installBtn');
const closeBtn = document.getElementById('installClose');
window.addEventListener('beforeinstallprompt', e => {
  e.preventDefault(); deferredPrompt = e;
  setTimeout(() => banner.classList.add('show'), 1500);
});
installBtn.addEventListener('click', async () => {
  banner.classList.remove('show');
  if (deferredPrompt) { deferredPrompt.prompt(); await deferredPrompt.userChoice; deferredPrompt = null; }
});
closeBtn.addEventListener('click', () => banner.classList.remove('show'));
window.addEventListener('appinstalled', () => { banner.classList.remove('show'); deferredPrompt = null; });
</script>
